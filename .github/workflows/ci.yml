name: CI

env:
  UV_FROZEN: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      UV_PYTHON: '3.14'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check --select I
          uv run ruff format --check

      - name: Type check
        run: uv run pyright

      - name: Build
        run: uv build

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@v7
      
      - name: Test
        run: uv run pytest
        env:
          UV_PYTHON: ${{ matrix.python-version }}
